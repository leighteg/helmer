<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, user-scalable=no" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        color-scheme: dark;
        --splash-bg: #0b0d12;
        --splash-bg-2: #0f1724;
        --splash-fg: #f5f7ff;
        --splash-muted: #97a4bc;
        --splash-accent: #7ed6ff;
        --splash-accent-2: #ffb86b;
        --splash-panel: rgba(9, 12, 18, 0.72);
        --splash-panel-border: rgba(124, 155, 195, 0.25);
        --splash-bar-bg: rgba(245, 248, 255, 0.12);
        --splash-shadow: 0 24px 60px rgba(4, 8, 14, 0.55);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: var(--splash-bg);
        font-family: "Space Grotesk", "Satoshi", "SF Pro Display", "Segoe UI", sans-serif;
      }

      #{{MOUNT_ID}} {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
      }

      canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        position: absolute;
        inset: 0;
        outline: none;
      }

      #helmer-splash {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: var(--splash-fg);
        background:
          radial-gradient(1200px 800px at 20% 15%, rgba(126, 214, 255, 0.2), transparent 60%),
          radial-gradient(900px 700px at 85% 70%, rgba(255, 184, 107, 0.18), transparent 60%),
          linear-gradient(160deg, var(--splash-bg), var(--splash-bg-2) 45%, #0a0c12);
        transition: opacity 280ms ease, transform 480ms ease;
        z-index: 5;
      }

      #helmer-splash::before {
        content: "";
        position: absolute;
        inset: -20%;
        background:
          radial-gradient(closest-side, rgba(255, 255, 255, 0.08), transparent 70%),
          radial-gradient(closest-side, rgba(126, 214, 255, 0.12), transparent 65%);
        opacity: 0.4;
        pointer-events: none;
      }

      #helmer-splash.splash--hidden {
        opacity: 0;
        transform: translateY(-6px) scale(1.01);
        pointer-events: none;
      }

      .splash__panel {
        position: relative;
        z-index: 1;
        padding: 36px 32px 28px;
        border-radius: 28px;
        border: 1px solid var(--splash-panel-border);
        background: var(--splash-panel);
        box-shadow: var(--splash-shadow);
        backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        min-width: min(320px, 78vw);
      }

      .splash__logo {
        width: min(200px, 50vw);
        height: auto;
        display: block;
        transform: translateX(-4%);
        filter: drop-shadow(0 18px 30px rgba(4, 10, 18, 0.5));
      }

      .splash__logo path {
        fill: var(--splash-fg) !important;
      }

      .splash__progress {
        width: min(320px, 72vw);
        height: 10px;
        background: var(--splash-bar-bg);
        border-radius: 999px;
        overflow: hidden;
      }

      .splash__bar {
        height: 100%;
        width: 100%;
        transform: scaleX(0);
        transform-origin: left center;
        background: linear-gradient(120deg, var(--splash-accent), var(--splash-accent-2));
        border-radius: 999px;
        transition: transform 200ms ease;
      }

      .splash__bar.is-indeterminate {
        transform: scaleX(0.2);
        background-size: 200% 100%;
        animation: splash-sheen 1.2s ease-in-out infinite;
      }

      .splash__label {
        font-family: "Space Mono", "SF Mono", "JetBrains Mono", "Menlo", monospace;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--splash-muted);
      }

      @keyframes splash-sheen {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 100% 50%;
        }
      }

      @media (max-width: 640px) {
        .splash__panel {
          padding: 28px 24px 22px;
          border-radius: 22px;
          gap: 14px;
        }

        .splash__label {
          font-size: 11px;
        }
      }
    </style>
  </head>
