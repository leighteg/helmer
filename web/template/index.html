<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, user-scalable=no" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {

        height: 100%;

        background: #101113;

        height: 100%;

        outline: none;
      }

  </head>
  <body>
    <div id="{{MOUNT_ID}}"></div>
    <script type="module" src="./main.js"></script>
